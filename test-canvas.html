<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas 测试</title>
  <style>
    body { background: #1a1a2e; padding: 20px; font-family: serif; }
    canvas { border: 1px solid #22d3ee; margin: 10px 0; }
    .label { color: #eaeaea; margin: 10px 0; }
  </style>
</head>
<body>
  <h2 style="color:#22d3ee">Canvas 分享卡片测试</h2>
  
  <div class="label">测试1: 正常长度文本</div>
  <canvas id="canvas1" width="540" height="700"></canvas>
  
  <div class="label">测试2: 长文本（200字摘要）</div>
  <canvas id="canvas2" width="540" height="700"></canvas>
  
  <div class="label">测试3: 完整标题（30字）+ 长摘要</div>
  <canvas id="canvas3" width="540" height="700"></canvas>

  <script>
    function wrapTextSimple(ctx, text, x, y, maxWidth, lineHeight) {
      const cleanText = text.replace(/[#*`>\n]/g, ' ').replace(/\s+/g, ' ').trim();
      if (!cleanText) return 0;
      
      let cy = y;
      let currentLine = '';
      
      for (const char of cleanText) {
        const testLine = currentLine + char;
        const metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && currentLine !== '') {
          ctx.fillText(currentLine, x, cy);
          currentLine = char;
          cy += lineHeight;
        } else {
          currentLine = testLine;
        }
      }
      if (currentLine) {
        ctx.fillText(currentLine, x, cy);
        cy += lineHeight;
      }
      return cy - y;
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      ctx.fill();
    }

    function formatDate(s) {
      return new Date(s).toLocaleDateString('zh-CN', { 
        year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' 
      }).replace('星期', ' 星期');
    }

    function drawCard(canvas, title, body, date, source) {
      const ctx = canvas.getContext('2d');
      const scale = 2;
      canvas.width = 540 * scale;
      canvas.height = 700 * scale;
      ctx.scale(scale, scale);

      const cardWidth = 540;
      const cardHeight = 700;
      const padding = 35;
      const contentWidth = cardWidth - padding * 2;

      // 背景渐变
      const gradient = ctx.createLinearGradient(0, 0, cardWidth, cardHeight);
      gradient.addColorStop(0, 'rgba(13, 27, 42, 0.98)');
      gradient.addColorStop(1, 'rgba(22, 33, 62, 0.98)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, cardWidth, cardHeight);

      // 顶部青色装饰线
      ctx.fillStyle = '#22d3ee';
      ctx.fillRect(0, 0, cardWidth, 4);

      // 右下角光晕
      const glowGradient = ctx.createRadialGradient(cardWidth - 100, cardHeight, 0, cardWidth - 100, cardHeight, 400);
      glowGradient.addColorStop(0, 'rgba(34, 211, 238, 0.08)');
      glowGradient.addColorStop(1, 'transparent');
      ctx.fillStyle = glowGradient;
      ctx.fillRect(0, 0, cardWidth, cardHeight);

      // Logo
      ctx.fillStyle = '#22d3ee';
      ctx.font = 'bold 18px "Noto Serif SC", serif';
      ctx.textBaseline = 'top';
      ctx.fillText('日知录', padding, padding);

      // 日期
      ctx.fillStyle = 'rgba(234, 234, 234, 0.5)';
      ctx.font = '14px "Noto Serif SC", serif';
      ctx.textAlign = 'right';
      ctx.fillText(formatDate(date), cardWidth - padding, padding + 2);
      ctx.textAlign = 'left';

      // 标题
      const titleY = padding + 50;
      ctx.fillStyle = '#eaeaea';
      ctx.font = 'bold 28px "Noto Serif SC", serif';
      const titleHeight = wrapTextSimple(ctx, title.slice(0, 50), padding, titleY, contentWidth, 42);
      console.log('标题高度:', titleHeight, '标题行数:', titleHeight / 42);

      // 正文摘要
      const bodyY = titleY + titleHeight + 24;
      ctx.fillStyle = 'rgba(234, 234, 234, 0.7)';
      ctx.font = '16px "Noto Serif SC", serif';
      const bodyHeight = wrapTextSimple(ctx, body.replace(/[#*`]/g, '').slice(0, 200), padding, bodyY, contentWidth, 32);
      console.log('正文高度:', bodyHeight, '正文行数:', bodyHeight / 32);
      console.log('正文结束位置:', bodyY + bodyHeight);
      console.log('卡片高度:', cardHeight);

      // 底部 Footer
      const footerY = cardHeight - 90;

      // 来源标签
      ctx.fillStyle = 'rgba(34, 211, 238, 0.12)';
      ctx.font = '13px "Noto Serif SC", serif';
      const sourceText = source.length > 20 ? source.slice(0, 20) + '…' : source;
      const sourceWidth = ctx.measureText(sourceText).width + 40;
      drawRoundedRect(ctx, padding, footerY + 10, sourceWidth, 36, 18);
      ctx.fillStyle = '#22d3ee';
      ctx.fillText(sourceText, padding + 20, footerY + 20);

      // 品牌文字
      ctx.fillStyle = 'rgba(234, 234, 234, 0.3)';
      ctx.font = '12px "Noto Serif SC", serif';
      ctx.textAlign = 'right';
      ctx.fillText('日知录 · 每日认知精进', cardWidth - padding, footerY + 20);
      ctx.textAlign = 'left';
    }

    // 测试数据
    const testTitle = '最高明的医生，在疾病还没有发生的时候就预防它';
    const testBody = '在投资领域，有一个著名的概念叫做「久期」，它指的是投资者等待赎回其资金所需的时间。这个概念告诉我们，时间是我们最宝贵的资源，因为它决定了我们能够承受多大的风险并获得相应的回报。\n\n真正聪明的人，不是忙着救火的人，而是那些能够预见问题并提前解决的人。这就像一个优秀的医生，不是等到病人病情危重才出手，而是在疾病还处于萌芽状态时就将其扼杀。这种预防性的思维方式，可以帮助我们避免很多不必要的麻烦和损失。';
    const testDate = '2026-04-09';
    const testSource = '日知录';

    // 绘制测试卡片
    const canvas1 = document.getElementById('canvas1');
    drawCard(canvas1, testTitle.slice(0, 20), testBody.slice(0, 100), testDate, testSource);

    const canvas2 = document.getElementById('canvas2');
    drawCard(canvas2, testTitle.slice(0, 20), testBody, testDate, testSource);

    const canvas3 = document.getElementById('canvas3');
    drawCard(canvas3, testTitle, testBody, testDate, testSource);
  </script>
</body>
</html>
