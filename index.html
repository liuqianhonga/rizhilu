<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日知录 · 每日认知精进</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a1a2e',
            accent: '#16213e',
            highlight: '#0f3460',
            text: '#eaeaea'
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
    body { font-family: 'Noto Serif SC', serif; }
    
    .markdown-body {
      line-height: 1.8;
      color: rgba(234, 234, 234, 0.85);
    }
    
    .markdown-body h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #67e8f9;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid rgba(103, 232, 249, 0.2);
    }
    
    .markdown-body h3:first-child {
      margin-top: 0.5rem;
    }
    
    .markdown-body p {
      margin-bottom: 0.75rem;
    }
    
    .markdown-body ul {
      list-style: none;
      padding-left: 0;
      margin-bottom: 1rem;
    }
    
    .markdown-body li {
      position: relative;
      padding-left: 1.5rem;
      margin-bottom: 0.5rem;
    }
    
    .markdown-body li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: #67e8f9;
      font-weight: bold;
    }
    
    .markdown-body strong {
      color: #67e8f9;
      font-weight: 700;
    }
    
    /* 引用块样式（金句） */
    .markdown-body blockquote {
      border-left: 3px solid #22d3ee;
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      background: linear-gradient(90deg, rgba(34, 211, 238, 0.15) 0%, transparent 100%);
      border-radius: 0 8px 8px 0;
    }
    
    .markdown-body blockquote p {
      color: #22d3ee;
      font-weight: 700;
      font-size: 1.05rem;
      margin: 0;
    }
  </style>
</head>
<body class="bg-primary min-h-screen text-text">
  
  <header class="py-12 text-center border-b border-highlight/30">
    <h1 class="text-4xl font-bold mb-2">日知录</h1>
    <p class="text-text/60">日知其所亡，月无忘其所能</p>
    <p id="stats" class="mt-4 text-sm text-text/40"></p>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-12">
    <div id="timeline"></div>
  </main>

  <footer class="py-8 text-center text-text/30 text-sm border-t border-highlight/30">
    <p>日拱一卒，进一寸有一寸的欢喜</p>
  </footer>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    async function loadData() {
      const res = await fetch('data.json');
      return res.json();
    }

    function renderTimeline(data) {
      const container = document.getElementById('timeline');
      const stats = document.getElementById('stats');
      
      const dates = [...new Set(data.map(i => i.date))];
      stats.textContent = `共 ${data.length} 条认知 · 跨越 ${dates.length} 天`;
      
      const grouped = {};
      data.forEach(i => {
        if (!grouped[i.date]) grouped[i.date] = [];
        grouped[i.date].push(i);
      });

      let html = '';
      Object.keys(grouped).sort().reverse().forEach(date => {
        html += `
          <div class="mb-12">
            <div class="flex items-center mb-6">
              <div class="w-3 h-3 rounded-full bg-highlight mr-4"></div>
              <time class="text-lg text-text/70">${formatDate(date)}</time>
            </div>
            <div class="ml-7 border-l-2 border-highlight/30 pl-6 space-y-6">
              ${grouped[date].map(renderItem).join('')}
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function renderItem(item) {
      return `
        <article class="bg-accent/50 rounded-lg p-6 border border-highlight/20 hover:border-highlight/40 transition-colors">
          <div class="flex items-start justify-between mb-4">
            <h3 class="text-xl font-bold text-text">${item.title}</h3>
            ${item.source ? `<span class="text-xs text-text/50 bg-highlight/40 px-3 py-1 rounded-full">${item.source}</span>` : ''}
          </div>
          <div class="markdown-body">${marked.parse(item.body)}</div>
          ${item.tags ? `
            <div class="flex flex-wrap gap-2 mt-5 pt-4 border-t border-highlight/20">
              ${item.tags.map(t => `<span class="text-xs text-text/50 bg-primary/60 px-3 py-1 rounded-full">#${t}</span>`).join('')}
            </div>
          ` : ''}
        </article>
      `;
    }

    function formatDate(s) {
      return new Date(s).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }

    loadData().then(renderTimeline).catch(e => {
      document.getElementById('timeline').innerHTML = '<div class="text-center text-text/50 py-12"><p>加载失败</p></div>';
    });
  </script>
</body>
</html>
