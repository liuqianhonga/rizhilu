<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>日知录 · 每日认知精进</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a1a2e',
            accent: '#16213e',
            highlight: '#0f3460',
            text: '#eaeaea'
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
    
    * {
      -webkit-tap-highlight-color: transparent;
    }
    
    body { 
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
    }
    
    /* 移动端优化 */
    @media (max-width: 640px) {
      body {
        font-size: 15px;
      }
      .article-card {
        padding: 1.25rem !important;
      }
      .article-title {
        font-size: 1.125rem !important;
      }
      .article-source {
        font-size: 0.7rem !important;
        padding: 0.25rem 0.5rem !important;
      }
      .markdown-body h3 {
        font-size: 1rem !important;
        margin-top: 1.25rem !important;
      }
      .timeline-date {
        font-size: 1rem !important;
      }
      .timeline-marker {
        width: 0.625rem !important;
        height: 0.625rem !important;
      }
    }
    
    .markdown-body {
      line-height: 1.9;
      color: rgba(234, 234, 234, 0.85);
    }
    
    .markdown-body h3 {
      font-size: 1.125rem;
      font-weight: 700;
      color: #67e8f9;
      margin-top: 1.5rem;
      margin-bottom: 0.875rem;
      padding-bottom: 0.375rem;
      border-bottom: 1px solid rgba(103, 232, 249, 0.2);
    }
    
    .markdown-body h3:first-child {
      margin-top: 0.5rem;
    }
    
    .markdown-body p {
      margin-bottom: 0.875rem;
    }
    
    .markdown-body ul {
      list-style: none;
      padding-left: 0;
      margin-bottom: 1.25rem;
    }
    
    .markdown-body li {
      position: relative;
      padding-left: 1.5rem;
      margin-bottom: 0.625rem;
      line-height: 1.7;
    }
    
    .markdown-body li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: #67e8f9;
      font-weight: bold;
      font-size: 1.2rem;
      line-height: 1.4;
    }
    
    .markdown-body strong {
      color: #67e8f9;
      font-weight: 700;
    }
    
    /* 引用块样式（金句） */
    .markdown-body blockquote {
      border-left: 4px solid #22d3ee;
      padding: 1.25rem 1.5rem;
      margin: 1.75rem 0;
      background: linear-gradient(90deg, rgba(34, 211, 238, 0.12) 0%, transparent 100%);
      border-radius: 0 12px 12px 0;
    }
    
    .markdown-body blockquote p {
      color: #22d3ee;
      font-weight: 700;
      font-size: 1.05rem;
      margin: 0;
      line-height: 1.6;
    }
    
    /* 时间线优化 */
    .timeline-item {
      margin-bottom: 3rem;
    }
    
    .timeline-content {
      margin-left: 1.75rem;
      border-left-width: 2px;
      padding-left: 1.5rem;
    }
    
    /* 卡片间距 */
    .article-card {
      background: rgba(22, 33, 62, 0.5);
      border-radius: 12px;
      padding: 1.75rem;
      border: 1px solid rgba(15, 52, 96, 0.2);
      transition: all 0.2s ease;
      margin-bottom: 1.5rem;
    }
    
    .article-card:hover {
      border-color: rgba(15, 52, 96, 0.4);
    }
    
    .article-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #eaeaea;
      margin-bottom: 0;
    }
    
    .article-source {
      font-size: 0.75rem;
      color: rgba(234, 234, 234, 0.5);
      background: rgba(15, 52, 96, 0.4);
      padding: 0.375rem 0.75rem;
      border-radius: 9999px;
      white-space: nowrap;
    }
    
    .tag-item {
      font-size: 0.75rem;
      color: rgba(234, 234, 234, 0.5);
      background: rgba(26, 26, 46, 0.6);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
    }

    /* 分享卡片样式 */
    #share-card {
      width: 1200px;
      min-height: 630px;
      height: auto;
      background: linear-gradient(135deg, rgba(13, 27, 42, 0.98) 0%, rgba(22, 33, 62, 0.98) 100%);
      padding: 60px 70px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      position: relative;
      overflow: visible;
      font-family: 'Noto Serif SC', serif;
    }

    /* 移动端卡片适配 */
    @media (max-width: 768px) {
      #share-card {
        width: min(540px, 90vw);
        min-height: auto;
        height: auto;
        padding: 30px 35px;
      }
      .share-card-title {
        font-size: 28px !important;
        margin-bottom: 16px;
      }
      .share-card-summary {
        font-size: 16px !important;
        margin-bottom: 20px;
      }
      .share-card-logo {
        font-size: 16px !important;
      }
      .share-card-date {
        font-size: 14px !important;
      }
      .share-card-source {
        font-size: 14px !important;
        padding: 6px 14px !important;
      }
      .share-card-brand {
        font-size: 12px !important;
      }
      .share-card-footer {
        padding-top: 16px !important;
      }
    }

    #share-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #22d3ee 0%, #67e8f9 50%, #22d3ee 100%);
    }

    #share-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .share-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .share-card-logo {
      font-size: 18px;
      font-weight: 700;
      color: #22d3ee;
      letter-spacing: 2px;
    }

    .share-card-date {
      font-size: 16px;
      color: rgba(234, 234, 234, 0.5);
      margin-left: auto;
    }

    .share-card-title {
      font-size: 42px;
      font-weight: 700;
      color: #eaeaea;
      line-height: 1.3;
      margin-bottom: 24px;
      flex: 1;
    }

    .share-card-summary {
      font-size: 20px;
      color: rgba(234, 234, 234, 0.7);
      line-height: 1.8;
      margin-bottom: 30px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .share-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 24px;
      border-top: 1px solid rgba(103, 232, 249, 0.15);
    }

    .share-card-source {
      font-size: 16px;
      color: #22d3ee;
      background: rgba(34, 211, 238, 0.12);
      padding: 8px 20px;
      border-radius: 9999px;
    }

    .share-card-brand {
      font-size: 14px;
      color: rgba(234, 234, 234, 0.3);
      letter-spacing: 1px;
    }

    /* 分享菜单样式 */
    .share-menu {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 9999;
      animation: fadeIn 0.2s ease;
      touch-action: manipulation;
      -webkit-user-scalable=no;
      user-scalable=no;
    }

    @media (max-width: 768px) {
      .share-menu-content {
        width: 90vw;
        max-width: 90vw;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .share-menu-content {
      background: var(--bg-secondary, #1a1a2e);
      border-radius: 16px 16px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .share-menu-title {
      text-align: center;
      font-size: 14px;
      color: rgba(234, 234, 234, 0.5);
      margin-bottom: 20px;
    }
    .share-menu-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .share-menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .share-menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .share-menu-item-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .share-menu-item-label {
      font-size: 12px;
      color: rgba(234, 234, 234, 0.8);
    }
    .share-menu-close {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: none;
      color: rgba(234, 234, 234, 0.6);
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body class="bg-primary min-h-screen text-text">
  
  <header class="py-10 px-4 text-center border-b border-highlight/30">
    <h1 class="text-3xl sm:text-4xl font-bold mb-2">日知录</h1>
    <p class="text-text/60 text-sm sm:text-base">日知其所亡，月无忘其所能</p>
    <p id="stats" class="mt-4 text-xs sm:text-sm text-text/40"></p>
  </header>

  <main class="max-w-3xl mx-auto px-3 sm:px-4 py-8 sm:py-12">
    <div id="timeline"></div>
  </main>

  <footer class="py-6 sm:py-8 text-center text-text/30 text-xs sm:text-sm border-t border-highlight/30">
    <p>日拱一卒，进一寸有一寸的欢喜</p>
  </footer>

  <!-- 分享卡片模板（隐藏） -->
  <div id="share-card" style="display:none;position:absolute;pointer-events:none;opacity:0">
    <div class="share-card-header">
      <span class="share-card-logo">日知录</span>
      <span class="share-card-date" id="share-card-date"></span>
    </div>
    <h2 class="share-card-title" id="share-card-title"></h2>
    <p class="share-card-summary" id="share-card-summary"></p>
    <div class="share-card-footer">
      <span class="share-card-source" id="share-card-source"></span>
      <span class="share-card-brand">日知录 · 每日认知精进</span>
    </div>
  </div>

  <!-- 分享菜单（动态显示） -->
  <div id="share-menu" class="share-menu" style="display:none" onclick="if(event.target===this)closeShareMenu()">
    <div class="share-menu-content">
      <div class="share-menu-title">分享图片</div>
      <div class="share-menu-options">
        <div class="share-menu-item" id="share-btn-system" onclick="systemShare()">
          <div class="share-menu-item-icon" style="background:#22d3ee">📱</div>
          <div class="share-menu-item-label">系统分享</div>
        </div>
        <div class="share-menu-item" onclick="copyImageToClipboard()">
          <div class="share-menu-item-icon" style="background:#67e8f9">📋</div>
          <div class="share-menu-item-label">复制图片</div>
        </div>
        <div class="share-menu-item" onclick="downloadImage()">
          <div class="share-menu-item-icon" style="background:#34d399">⬇️</div>
          <div class="share-menu-item-label">下载图片</div>
        </div>
      </div>
      <div class="share-menu-options" style="margin-top:12px">
        <div class="share-menu-item" onclick="shareToWechat()">
          <div class="share-menu-item-icon" style="background:#07c160">💚</div>
          <div class="share-menu-item-label">微信</div>
        </div>
        <div class="share-menu-item" onclick="shareToTwitter()">
          <div class="share-menu-item-icon" style="background:#1da1f2">🐦</div>
          <div class="share-menu-item-label">Twitter</div>
        </div>
        <div class="share-menu-item" onclick="shareToQQ()">
          <div class="share-menu-item-icon" style="background:#12b7f5">🟦</div>
          <div class="share-menu-item-label">QQ</div>
        </div>
      </div>
      <button class="share-menu-close" onclick="closeShareMenu()">取消</button>
    </div>
  </div>

  <!-- 浮动目录 -->
  <div style="position:fixed;right:1rem;bottom:1.5rem;z-index:50;display:flex;align-items:center;gap:0.5rem">
    <div id="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="display:none;background:rgba(34,211,238,0.15);border:1px solid rgba(34,211,238,0.3);backdrop-filter:blur(8px);border-radius:9999px;padding:0.5rem 0.875rem;cursor:pointer;font-size:0.8rem;color:#22d3ee;user-select:none">↑</div>
    <div id="toc-btn" onclick="toggleToc()" style="background:rgba(34,211,238,0.15);border:1px solid rgba(34,211,238,0.3);backdrop-filter:blur(8px);border-radius:9999px;padding:0.5rem 1rem;cursor:pointer;font-size:0.8rem;color:#22d3ee;user-select:none">📖 目录</div>
  </div>

  <div id="toc-panel" style="display:none;position:fixed;right:1rem;bottom:4rem;z-index:50;width:min(280px,85vw);max-height:60vh;overflow-y:auto;background:rgba(22,33,62,0.95);border:1px solid rgba(34,211,238,0.2);backdrop-filter:blur(12px);border-radius:12px;padding:0.75rem">
    <div id="toc-content"></div>
  </div>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    async function loadData() {
      const res = await fetch('data.json');
      return res.json();
    }

    function renderTimeline(data) {
      const container = document.getElementById('timeline');
      const stats = document.getElementById('stats');
      const toc = document.getElementById('toc-content');
      
      const dates = [...new Set(data.map(i => i.date))].sort().reverse();
      stats.textContent = `共 ${data.length} 条认知 · 跨越 ${dates.length} 天`;
      
      const grouped = {};
      data.forEach(i => {
        if (!grouped[i.date]) grouped[i.date] = [];
        grouped[i.date].push(i);
      });

      // 生成目录
      let tocHtml = '';
      dates.forEach(date => {
        tocHtml += `<div style="margin-bottom:0.75rem">
          <div onclick="jumpToDate('${date}')" style="color:#22d3ee;font-size:0.75rem;font-weight:700;cursor:pointer;padding:0.25rem 0;border-bottom:1px solid rgba(34,211,238,0.15);margin-bottom:0.375rem">${formatDate(date)}</div>
          ${grouped[date].map(item => `<div onclick="jumpToItem(${item.id})" style="color:rgba(234,234,234,0.6);font-size:0.75rem;cursor:pointer;padding:0.2rem 0 0.2rem 0.75rem;line-height:1.4" onmouseover="this.style.color='#eaeaea'" onmouseout="this.style.color='rgba(234,234,234,0.6)'">${item.title}</div>`).join('')}
        </div>`;
      });
      toc.innerHTML = tocHtml;

      let html = '';
      dates.forEach(date => {
        html += `
          <div class="mb-10" id="date-${date}">
            <div class="flex items-center gap-2 mb-4">
              <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 flex-shrink-0"></span>
              <time class="text-sm text-text/50">${formatDate(date)}</time>
            </div>
            <div>${grouped[date].map(renderItem).join('')}</div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function toggleToc() {
      const p = document.getElementById('toc-panel');
      p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    function jumpToDate(date) {
      const el = document.getElementById('date-' + date);
      if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); toggleToc(); }
    }

    function jumpToItem(id) {
      const el = document.getElementById('item-' + id);
      if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); toggleToc(); }
    }

    function renderItem(item) {
      return `
        <article class="article-card" id="item-${item.id}">
          <div class="mb-4">
            <h3 class="article-title">${item.title}</h3>
            ${item.source ? `<span class="article-source inline-block mt-2">${item.source}</span>` : ''}
          </div>
          <div class="markdown-body">${marked.parse(item.body)}</div>
          ${item.tags ? `
            <div class="flex flex-wrap gap-2 mt-5 pt-4 border-t border-highlight/20">
              ${item.tags.map(t => `<span class="tag-item">#${t}</span>`).join('')}
            </div>
          ` : ''}
          <div class="flex items-center gap-3 mt-4 pt-3 border-t border-highlight/10">
            <span style="font-size:0.7rem;color:rgba(234,234,234,0.3)">分享：</span>
            ${navigator && navigator.share ? '' : `
            <a href="https://service.weibo.com/share/share.php?url=${encodeURIComponent(location.href+'#item-'+item.id)}&title=${encodeURIComponent(item.title+'\n\n'+item.body.slice(0,80)+'...')}" target="_blank" style="font-size:0.75rem;color:rgba(234,234,234,0.4);text-decoration:none;padding:0.2rem 0.6rem;border:1px solid rgba(234,234,234,0.1);border-radius:9999px" onmouseover="this.style.color='#eaeaea'" onmouseout="this.style.color='rgba(234,234,234,0.4)'">🟠 微博</a>
            <a href="https://connect.qq.com/widget/shareqq/index.html?url=${encodeURIComponent(location.href+'#item-'+item.id)}&title=${encodeURIComponent(item.title)}&summary=${encodeURIComponent(item.body.slice(0,80))}" target="_blank" style="font-size:0.75rem;color:rgba(234,234,234,0.4);text-decoration:none;padding:0.2rem 0.6rem;border:1px solid rgba(234,234,234,0.1);border-radius:9999px" onmouseover="this.style.color='#eaeaea'" onmouseout="this.style.color='rgba(234,234,234,0.4)'">🟦 QQ</a>
            <span onclick="navigator.clipboard.writeText(location.href+'#item-'+item.id).then(()=>alert('链接已复制，可分享到微信'))" style="font-size:0.75rem;color:rgba(234,234,234,0.4);cursor:pointer;padding:0.2rem 0.6rem;border:1px solid rgba(234,234,234,0.1);border-radius:9999px" onmouseover="this.style.color='#eaeaea'" onmouseout="this.style.color='rgba(234,234,234,0.4)'">🟢 微信</span>
            `}
            <span onclick="shareArticle('${encodeURIComponent(item.title)}','${encodeURIComponent(item.body)}','${encodeURIComponent(item.date)}','${encodeURIComponent(item.source || '')}')" style="font-size:0.75rem;color:rgba(34,211,238,0.8);cursor:pointer;padding:0.2rem 0.6rem;border:1px solid rgba(34,211,238,0.3);border-radius:9999px" onmouseover="this.style.color='#22d3ee';this.style.borderColor='rgba(34,211,238,0.5)'" onmouseout="this.style.color='rgba(34,211,238,0.8)';this.style.borderColor='rgba(34,211,238,0.3)'">&#8679; 分享</span>
          </div>
        </article>
      `;
    }

    function formatDate(s) {
      return new Date(s).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' }).replace('星期', ' 星期');
    }

    loadData().then(renderTimeline).catch(e => {
      document.getElementById('timeline').innerHTML = '<div class="text-center text-text/50 py-12"><p>加载失败</p></div>';
    });

    window.addEventListener('scroll', () => {
      document.getElementById('top-btn').style.display = window.scrollY > 200 ? 'inline' : 'none';
    });

    function shareItem(title, text, url) {
      const t = decodeURIComponent(title), tx = decodeURIComponent(text), u = decodeURIComponent(url);
      if (navigator.share) {
        navigator.share({ title: t, text: tx, url: u });
      } else {
        navigator.clipboard.writeText(u).then(() => alert('链接已复制'));
      }
    }

    // ========== 使用 html2canvas 捕获网页卡片（干净的实现） ==========
    async function shareAsImage(title, body, date, source) {
      const t = decodeURIComponent(title);
      const b = decodeURIComponent(body);
      const d = decodeURIComponent(date);
      const s = decodeURIComponent(source) || '日知录';

      // 填充卡片内容
      document.getElementById('share-card-title').textContent = t;
      document.getElementById('share-card-summary').textContent = b.replace(/[#*`]/g, '');
      document.getElementById('share-card-date').textContent = formatDate(d);
      document.getElementById('share-card-source').textContent = s;
      document.getElementById('share-card-source').style.display = s ? 'inline-block' : 'none';

      const card = document.getElementById('share-card');
      const isMobile = window.innerWidth < 768;

      // 创建一个完全隔离的容器用于截图（不影响页面）
      const container = document.createElement('div');
      container.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0;pointer-events:none;z-index:-1;visibility:hidden;';
      document.body.appendChild(container);

      // 克隆卡片到隔离容器
      const clonedCard = card.cloneNode(true);
      // 设置移动端宽度
      if (isMobile) {
        clonedCard.style.width = '540px';
      }
      container.appendChild(clonedCard);

      // 等待克隆节点渲染
      await new Promise(r => setTimeout(r, 50));

      try {
        const canvas = await html2canvas(clonedCard, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#0d1b2a',
          logging: false,
          width: isMobile ? 540 : 1200,
          height: clonedCard.offsetHeight,
          windowWidth: clonedCard.scrollWidth,
          windowHeight: clonedCard.scrollHeight
        });
        return canvas;
      } finally {
        // 清理：移除隔离容器
        document.body.removeChild(container);
      }
    }

    async function shareArticle(title, body, date, source) {
      const t = decodeURIComponent(title);
      const b = decodeURIComponent(body);
      const d = decodeURIComponent(date);
      const s = decodeURIComponent(source);

      try {
        // 1. 生成卡片图片
        const canvas = await shareAsImage(title, body, date, source);

        // 2. 转 blob
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const fileName = `日知录_${d}_${t.slice(0, 20)}.png`;

        // 3. 系统分享（移动端）
        if (navigator.share) {
          try {
            const file = new File([blob], fileName, { type: 'image/png' });
            const shareData = { title: t, text: '来自日知录的每日认知精进' };
            // 检测是否支持文件分享
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              shareData.files = [file];
            }
            await navigator.share(shareData);
            return; // 分享成功
          } catch (e) {
            if (e.name === 'AbortError') return; // 用户取消，直接返回
            // 其他错误，继续降级到下载
          }
        }

        // 4. 降级：下载
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        if (e.name !== 'AbortError') {
          console.error(e);
          alert('分享失败，请重试');
        }
      }
    }

    function resetCardPosition() {
      const card = document.getElementById('share-card');
      card.style.display = 'none';
      card.style.visibility = 'hidden';
    }

    function closeShareMenu() {
      document.getElementById('share-menu').style.display = 'none';
      resetCardPosition();
      window._shareCanvas = null;
    }

    function downloadImage() {
      const canvas = window._shareCanvas;
      if (!canvas) return;
      const link = document.createElement('a');
      link.download = window._shareFileName;
      link.href = canvas.toDataURL('image/png');
      link.click();
      closeShareMenu();
    }

    async function copyImageToClipboard() {
      const canvas = window._shareCanvas;
      if (!canvas) return;
      try {
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        alert('图片已复制到剪贴板');
        closeShareMenu();
      } catch (e) {
        console.error(e);
        alert('复制失败，请尝试下载图片');
      }
    }

    async function systemShare() {
      const canvas = window._shareCanvas;
      if (!canvas) return;
      try {
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const file = new File([blob], window._shareFileName, { type: 'image/png' });
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            title: '日知录',
            text: '分享来自日知录的每日认知精进'
          });
          closeShareMenu();
        } else {
          // 浏览器不支持文件分享，降级到下载
          downloadImage();
        }
      } catch (e) {
        if (e.name !== 'AbortError') {
          console.error(e);
          alert('分享失败，请尝试其他方式');
        }
      }
    }

    function shareToWechat() {
      alert('请长按图片保存到相册，然后发到微信');
      closeShareMenu();
    }

    function shareToTwitter() {
      const url = encodeURIComponent(location.href);
      window.open(`https://twitter.com/intent/tweet?url=${url}&text=${encodeURIComponent('来自日知录的每日认知精进')}`, '_blank');
      closeShareMenu();
    }

    function shareToQQ() {
      const url = encodeURIComponent(location.href);
      window.open(`https://connect.qq.com/widget/shareqq/index.html?url=${url}&title=${encodeURIComponent('日知录')}&summary=${encodeURIComponent('分享来自日知录的每日认知精进')}`, '_blank');
      closeShareMenu();
    }
  </script>
