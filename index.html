<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日知录 · 每日认知精进</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a1a2e',
            accent: '#16213e',
            highlight: '#0f3460',
            text: '#eaeaea'
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
    
    * {
      -webkit-tap-highlight-color: transparent;
    }
    
    body { 
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
    }
    
    /* 移动端优化 */
    @media (max-width: 640px) {
      body {
        font-size: 15px;
      }
      .article-card {
        padding: 1.25rem !important;
      }
      .article-title {
        font-size: 1.125rem !important;
      }
      .article-source {
        font-size: 0.7rem !important;
        padding: 0.25rem 0.5rem !important;
      }
      .markdown-body h3 {
        font-size: 1rem !important;
        margin-top: 1.25rem !important;
      }
      .timeline-date {
        font-size: 1rem !important;
      }
      .timeline-marker {
        width: 0.625rem !important;
        height: 0.625rem !important;
      }
    }
    
    .markdown-body {
      line-height: 1.9;
      color: rgba(234, 234, 234, 0.85);
    }
    
    .markdown-body h3 {
      font-size: 1.125rem;
      font-weight: 700;
      color: #67e8f9;
      margin-top: 1.5rem;
      margin-bottom: 0.875rem;
      padding-bottom: 0.375rem;
      border-bottom: 1px solid rgba(103, 232, 249, 0.2);
    }
    
    .markdown-body h3:first-child {
      margin-top: 0.5rem;
    }
    
    .markdown-body p {
      margin-bottom: 0.875rem;
    }
    
    .markdown-body ul {
      list-style: none;
      padding-left: 0;
      margin-bottom: 1.25rem;
    }
    
    .markdown-body li {
      position: relative;
      padding-left: 1.5rem;
      margin-bottom: 0.625rem;
      line-height: 1.7;
    }
    
    .markdown-body li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: #67e8f9;
      font-weight: bold;
      font-size: 1.2rem;
      line-height: 1.4;
    }
    
    .markdown-body strong {
      color: #67e8f9;
      font-weight: 700;
    }
    
    /* 引用块样式（金句） */
    .markdown-body blockquote {
      border-left: 4px solid #22d3ee;
      padding: 1.25rem 1.5rem;
      margin: 1.75rem 0;
      background: linear-gradient(90deg, rgba(34, 211, 238, 0.12) 0%, transparent 100%);
      border-radius: 0 12px 12px 0;
    }
    
    .markdown-body blockquote p {
      color: #22d3ee;
      font-weight: 700;
      font-size: 1.05rem;
      margin: 0;
      line-height: 1.6;
    }
    
    /* 时间线优化 */
    .timeline-item {
      margin-bottom: 3rem;
    }
    
    .timeline-content {
      margin-left: 1.75rem;
      border-left-width: 2px;
      padding-left: 1.5rem;
    }
    
    /* 卡片间距 */
    .article-card {
      background: rgba(22, 33, 62, 0.5);
      border-radius: 12px;
      padding: 1.75rem;
      border: 1px solid rgba(15, 52, 96, 0.2);
      transition: all 0.2s ease;
      margin-bottom: 1.5rem;
    }
    
    .article-card:hover {
      border-color: rgba(15, 52, 96, 0.4);
    }
    
    .article-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #eaeaea;
      margin-bottom: 0;
    }
    
    .article-source {
      font-size: 0.75rem;
      color: rgba(234, 234, 234, 0.5);
      background: rgba(15, 52, 96, 0.4);
      padding: 0.375rem 0.75rem;
      border-radius: 9999px;
      white-space: nowrap;
      margin-left: 0.75rem;
    }
    
    .tag-item {
      font-size: 0.75rem;
      color: rgba(234, 234, 234, 0.5);
      background: rgba(26, 26, 46, 0.6);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-primary min-h-screen text-text">
  
  <header class="py-10 px-4 text-center border-b border-highlight/30">
    <h1 class="text-3xl sm:text-4xl font-bold mb-2">日知录</h1>
    <p class="text-text/60 text-sm sm:text-base">日知其所亡，月无忘其所能</p>
    <p id="stats" class="mt-4 text-xs sm:text-sm text-text/40"></p>
  </header>

  <main class="max-w-3xl mx-auto px-3 sm:px-4 py-8 sm:py-12">
    <div id="timeline"></div>
  </main>

  <footer class="py-6 sm:py-8 text-center text-text/30 text-xs sm:text-sm border-t border-highlight/30">
    <p>日拱一卒，进一寸有一寸的欢喜</p>
  </footer>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    async function loadData() {
      const res = await fetch('data.json');
      return res.json();
    }

    function renderTimeline(data) {
      const container = document.getElementById('timeline');
      const stats = document.getElementById('stats');
      
      const dates = [...new Set(data.map(i => i.date))];
      stats.textContent = `共 ${data.length} 条认知 · 跨越 ${dates.length} 天`;
      
      const grouped = {};
      data.forEach(i => {
        if (!grouped[i.date]) grouped[i.date] = [];
        grouped[i.date].push(i);
      });

      let html = '';
      Object.keys(grouped).sort().reverse().forEach(date => {
        html += `
          <div class="mb-10">
            <div class="flex items-center gap-2 mb-4">
              <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 flex-shrink-0"></span>
              <time class="text-sm text-text/50">${formatDate(date)}</time>
            </div>
            <div>${grouped[date].map(renderItem).join('')}</div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function renderItem(item) {
      return `
        <article class="article-card">
          <div class="flex items-start justify-between flex-wrap gap-2 mb-4">
            <h3 class="article-title flex-1">${item.title}</h3>
            ${item.source ? `<span class="article-source flex-shrink-0">${item.source}</span>` : ''}
          </div>
          <div class="markdown-body">${marked.parse(item.body)}</div>
          ${item.tags ? `
            <div class="flex flex-wrap gap-2 mt-5 pt-4 border-t border-highlight/20">
              ${item.tags.map(t => `<span class="tag-item">#${t}</span>`).join('')}
            </div>
          ` : ''}
        </article>
      `;
    }

    function formatDate(s) {
      return new Date(s).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }

    loadData().then(renderTimeline).catch(e => {
      document.getElementById('timeline').innerHTML = '<div class="text-center text-text/50 py-12"><p>加载失败</p></div>';
    });
  </script>
</body>
</html>
