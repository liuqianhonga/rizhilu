<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>日知录 · 每日认知精进</title>
  <link rel=icon href=favicon.svg type=image/svg+xml type=image/x-icon>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a1a2e',
            accent: '#16213e',
            highlight: '#0f3460',
            text: '#eaeaea'
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
    
    * {
      -webkit-tap-highlight-color: transparent;
    }
    
    body { 
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
    }
    
    /* 移动端优化 */
    @media (max-width: 640px) {
      body {
        font-size: 15px;
      }
      .article-card {
        padding: 1.25rem !important;
      }
      .article-title {
        font-size: 1.125rem !important;
      }
      .article-source {
        font-size: 0.7rem !important;
        padding: 0.25rem 0.5rem !important;
      }
      .markdown-body h3 {
        font-size: 1rem !important;
        margin-top: 1.25rem !important;
      }
      .timeline-date {
        font-size: 1rem !important;
      }
      .timeline-marker {
        width: 0.625rem !important;
        height: 0.625rem !important;
      }
    }
    
    .markdown-body {
      line-height: 1.9;
      color: rgba(234, 234, 234, 0.85);
    }
    
    .markdown-body h3 {
      font-size: 1.125rem;
      font-weight: 700;
      color: #67e8f9;
      margin-top: 1.5rem;
      margin-bottom: 0.875rem;
      padding-bottom: 0.375rem;
      border-bottom: 1px solid rgba(103, 232, 249, 0.2);
    }
    
    .markdown-body h3:first-child {
      margin-top: 0.5rem;
    }
    
    .markdown-body p {
      margin-bottom: 0.875rem;
    }
    
    .markdown-body ul {
      list-style: none;
      padding-left: 0;
      margin-bottom: 1.25rem;
    }
    
    .markdown-body li {
      position: relative;
      padding-left: 1.5rem;
      margin-bottom: 0.625rem;
      line-height: 1.7;
    }
    
    .markdown-body li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: #67e8f9;
      font-weight: bold;
      font-size: 1.2rem;
      line-height: 1.4;
    }
    
    .markdown-body strong {
      color: #67e8f9;
      font-weight: 700;
    }
    
    /* 引用块样式（金句） */
    .markdown-body blockquote {
      border-left: 4px solid #22d3ee;
      padding: 1.25rem 1.5rem;
      margin: 1.75rem 0;
      background: linear-gradient(90deg, rgba(34, 211, 238, 0.12) 0%, transparent 100%);
      border-radius: 0 12px 12px 0;
    }
    
    .markdown-body blockquote p {
      color: #22d3ee;
      font-weight: 700;
      font-size: 1.05rem;
      margin: 0;
      line-height: 1.6;
    }
    
    /* 分隔线样式（---） */
    .markdown-body hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(103, 232, 249, 0.3), transparent);
      margin: 1.5rem 0;
    }
    
    /* 时间线优化 */
    .timeline-item {
      margin-bottom: 3rem;
    }
    
    .timeline-content {
      margin-left: 1.75rem;
      border-left-width: 2px;
      padding-left: 1.5rem;
    }
    
    /* 卡片间距 */
    .article-card {
      background: rgba(22, 33, 62, 0.5);
      border-radius: 12px;
      padding: 1.75rem;
      border: 1px solid rgba(15, 52, 96, 0.2);
      transition: all 0.2s ease;
      margin-bottom: 1.5rem;
    }
    
    .article-card:hover {
      border-color: rgba(15, 52, 96, 0.4);
    }
    
    .article-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #eaeaea;
      margin-bottom: 0;
    }
    
    .article-source {
      font-size: 0.75rem;
      color: rgba(234, 234, 234, 0.5);
      background: rgba(15, 52, 96, 0.4);
      padding: 0.375rem 0.75rem;
      border-radius: 9999px;
      white-space: nowrap;
    }
    
    .article-source {
      font-size: 0.75rem;
      color: rgba(234, 234, 234, 0.5);
      background: rgba(15, 52, 96, 0.4);
      padding: 0.375rem 0.75rem;
      border-radius: 9999px;
      white-space: nowrap;
    }

    .tag-item {
      font-size: 0.75rem;
      color: rgba(234, 234, 234, 0.5);
      background: rgba(26, 26, 46, 0.6);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
    }

  </style>
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "544982ef94b14702bfbd5acf328f1357"}'></script>
</head>
<body class="bg-primary min-h-screen text-text">
  
  <header class="py-10 px-4 text-center border-b border-highlight/30">
    <h1 class="text-3xl sm:text-4xl font-bold mb-2">日知录</h1>
    <p class="text-text/60 text-sm sm:text-base">日知其所亡，月无忘其所能</p>
    <p id="stats" class="mt-4 text-xs sm:text-sm text-text/40"></p>
  </header>

  <main class="max-w-3xl mx-auto px-3 sm:px-4 py-8 sm:py-12">
    <div id="timeline"></div>
  </main>

  <footer class="py-6 sm:py-8 text-center text-text/30 text-xs sm:text-sm border-t border-highlight/30">
    <p>日拱一卒，进一寸有一寸的欢喜</p>
  </footer>

  <!-- 浮动目录 -->
  <div style="position:fixed;right:1rem;bottom:1.5rem;z-index:50;display:flex;align-items:center;gap:0.5rem">
    <div id="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="display:none;background:rgba(34,211,238,0.15);border:1px solid rgba(34,211,238,0.3);backdrop-filter:blur(8px);border-radius:9999px;padding:0.5rem 0.875rem;cursor:pointer;font-size:0.8rem;color:#22d3ee;user-select:none">↑</div>
    <div id="toc-btn" onclick="toggleToc()" style="background:rgba(34,211,238,0.15);border:1px solid rgba(34,211,238,0.3);backdrop-filter:blur(8px);border-radius:9999px;padding:0.5rem 1rem;cursor:pointer;font-size:0.8rem;color:#22d3ee;user-select:none">📖 目录</div>
  </div>

  <div id="toc-panel" style="display:none;position:fixed;right:1rem;bottom:4rem;z-index:50;width:min(280px,85vw);max-height:60vh;overflow-y:auto;background:rgba(22,33,62,0.95);border:1px solid rgba(34,211,238,0.2);backdrop-filter:blur(12px);border-radius:12px;padding:0.75rem">
    <div id="toc-content"></div>
  </div>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    async function loadData() {
      const res = await fetch('data.json');
      return res.json();
    }

    function renderTimeline(data) {
      const container = document.getElementById('timeline');
      const stats = document.getElementById('stats');
      const toc = document.getElementById('toc-content');
      
      const dates = [...new Set(data.map(i => i.date))].sort().reverse();
      stats.textContent = `共 ${data.length} 条认知 · 跨越 ${dates.length} 天`;
      
      const grouped = {};
      data.forEach(i => {
        if (!grouped[i.date]) grouped[i.date] = [];
        grouped[i.date].push(i);
      });

      // 生成目录
      let tocHtml = '';
      dates.forEach(date => {
        tocHtml += `<div style="margin-bottom:0.75rem">
          <div onclick="jumpToDate('${date}')" style="color:#22d3ee;font-size:0.75rem;font-weight:700;cursor:pointer;padding:0.25rem 0;border-bottom:1px solid rgba(34,211,238,0.15);margin-bottom:0.375rem">${formatDate(date)}</div>
          ${grouped[date].map(item => `<div onclick="jumpToItem(${item.id})" style="color:rgba(234,234,234,0.6);font-size:0.75rem;cursor:pointer;padding:0.2rem 0 0.2rem 0.75rem;line-height:1.4" onmouseover="this.style.color='#eaeaea'" onmouseout="this.style.color='rgba(234,234,234,0.6)'">${item.title}</div>`).join('')}
        </div>`;
      });
      toc.innerHTML = tocHtml;

      let html = '';
      dates.forEach(date => {
        html += `
          <div class="mb-10" id="date-${date}">
            <div class="flex items-center gap-2 mb-4">
              <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 flex-shrink-0"></span>
              <time class="text-sm text-text/50">${formatDate(date)}</time>
            </div>
            <div>${grouped[date].map(renderItem).join('')}</div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function toggleToc() {
      const p = document.getElementById('toc-panel');
      p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    function jumpToDate(date) {
      const el = document.getElementById('date-' + date);
      if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); toggleToc(); }
    }

    function jumpToItem(id) {
      const el = document.getElementById('item-' + id);
      if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); toggleToc(); }
    }

    function renderItem(item) {
      return `
        <article class="article-card" id="item-${item.id}">
          <div class="mb-4">
            <h3 class="article-title">${item.title}</h3>
            ${item.tags && item.tags[0] ? `<span class="article-source inline-block mt-2">${item.tags[0]}</span>` : ''}
          </div>
          <div class="markdown-body">${marked.parse(item.body)}</div>
          ${item.tags ? `
            <div class="flex flex-wrap gap-2 mt-5 pt-4 border-t border-highlight/20">
              ${item.tags.map(t => `<span class="tag-item">#${t}</span>`).join('')}
            </div>
          ` : ''}
          ${item.references && item.references.length > 0 ? `
            <div class="mt-4 pt-4 border-t border-highlight/20">
              <div style="font-size:0.7rem;color:rgba(234,234,234,0.5);margin-bottom:0.5rem;">参考内容：</div>
              <div style="font-size:0.75rem;">
                ${item.references.map(r => `<a href="${r.url}" target="_blank" style="color:rgba(34,211,238,0.8);display:block;margin-bottom:0.25rem;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">• ${r.title}</a>`).join('')}
              </div>
            </div>
          ` : ''}
          <div class="flex items-center gap-3 mt-4 pt-3 border-t border-highlight/10">
            <span style="font-size:0.7rem;color:rgba(234,234,234,0.3)">分享：</span>
            <span id="share-btn-${item.id}" onclick="shareArticle('${item.id}','${encodeURIComponent(item.title)}','${encodeURIComponent(item.body)}','${encodeURIComponent(item.date)}','${encodeURIComponent(item.source || '')}')" style="font-size:0.75rem;color:rgba(34,211,238,0.8);cursor:pointer;padding:0.2rem 0.6rem;border:1px solid rgba(34,211,238,0.3);border-radius:9999px" onmouseover="this.style.color='#22d3ee';this.style.borderColor='rgba(34,211,238,0.5)'" onmouseout="this.style.color='rgba(34,211,238,0.8)';this.style.borderColor='rgba(34,211,238,0.3)'">&#8679; 分享</span>
          </div>
        </article>
      `;
    }

    function formatDate(s) {
      return new Date(s).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' }).replace('星期', ' 星期');
    }

    loadData().then(renderTimeline).catch(e => {
      document.getElementById('timeline').innerHTML = '<div class="text-center text-text/50 py-12"><p>加载失败</p></div>';
    });

    window.addEventListener('scroll', () => {
      document.getElementById('top-btn').style.display = window.scrollY > 200 ? 'inline' : 'none';
    });

    function shareItem(title, text, url) {
      const t = decodeURIComponent(title), tx = decodeURIComponent(text), u = decodeURIComponent(url);
      if (navigator.share) {
        navigator.share({ title: t, text: tx, url: u });
      } else {
        navigator.clipboard.writeText(u).then(() => alert('链接已复制'));
      }
    }

    // ========== 使用 html-to-image 捕获网页卡片 ==========
    async function shareAsImage(itemId) {
      const originalCard = document.getElementById('item-' + itemId);
      if (!originalCard) return null;

      // 克隆卡片
      const clonedCard = originalCard.cloneNode(true);

      // 移除分享区域
      const shareSection = clonedCard.querySelector('.flex.items-center.gap-3.mt-4.pt-3');
      if (shareSection) shareSection.remove();

      // 创建隔离容器（隐藏）
      const container = document.createElement('div');
      container.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;pointer-events:none;z-index:-1;overflow:hidden;background:#16213e;';
      document.body.appendChild(container);
      container.appendChild(clonedCard);

      // 手机宽度适配
      const isMobile = window.innerWidth < 768;
      const cardWidth = isMobile ? Math.min(540, window.innerWidth * 0.9) : 720;
      const padding = isMobile ? '1.25rem' : '1.75rem';
      const topPadding = isMobile ? '44px' : '0'; // 刘海屏安全距离

      // 生成二维码（使用 QR Server API 生成带颜色的二维码）
      const itemUrl = location.href.split('#')[0] + '#item-' + itemId;
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(itemUrl)}&color=34-211-238&bgcolor=22-33-62`;

      // 创建 footer
      const footer = document.createElement('div');
      footer.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:16px 8px 0 8px;margin-top:20px;border-top:1px solid rgba(103,232,249,0.15);';
      footer.innerHTML = `
        <div>
          <div style="font-size:22px;font-weight:700;color:#eaeaea;letter-spacing:4px;">日知录</div>
          <div style="font-size:11px;color:rgba(234,234,234,0.4);margin-top:6px;">日拱一卒，进一寸有一寸的欢喜</div>
        </div>
        <div style="width:72px;height:72px;flex-shrink:0;">
          <img src="${qrUrl}" width="72" height="72" style="display:block;" />
        </div>
      `;
      clonedCard.appendChild(footer);

      // 确保卡片可见，顶部留安全距离
      clonedCard.style.cssText = `
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
        position: static !important;
        pointer-events: none !important;
        width: ${cardWidth}px !important;
        background-color: #16213e !important;
        border-radius: 12px !important;
        padding: ${topPadding} ${padding} ${padding} ${padding} !important;
        border: 1px solid rgba(15, 52, 96, 0.2) !important;
        box-sizing: border-box !important;
      `;

      // 等待渲染
      await new Promise(r => setTimeout(r, 100));

      try {
        const canvas = await htmlToImage.toCanvas(clonedCard, {
          pixelRatio: 3,
          backgroundColor: '#16213e',
          cacheBust: true
        });
        document.body.removeChild(container);
        return canvas;
      } catch (e) {
        console.error(e);
        document.body.removeChild(container);
        return null;
      }
    }

    async function shareArticle(itemId, title, body, date, source) {
      const t = decodeURIComponent(title);
      const d = decodeURIComponent(date);
      const btn = document.getElementById('share-btn-' + itemId);
      const originalText = btn.textContent;
      btn.textContent = '...生成中';
      btn.style.pointerEvents = 'none';

      const canvas = await shareAsImage(itemId);
      btn.textContent = originalText;
      btn.style.pointerEvents = '';

      if (!canvas) {
        alert('图片生成失败');
        return;
      }

      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      const fileName = `日知录_${d}_${t.slice(0, 20)}.png`;

      // 检测 iOS
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

      // 非 iOS 设备尝试带文件的系统分享
      if (navigator.share && !isIOS) {
        const file = new File([blob], fileName, { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ title: t, text: '来自日知录的每日认知精进', files: [file] });
            return;
          } catch (e) {
            if (e.name === 'AbortError') return;
            // 分享出错，降级到下载
          }
        }
      }

      // 降级：直接下载图片
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      a.click();
      URL.revokeObjectURL(url);
    }

  </script>
</body>
</html>
